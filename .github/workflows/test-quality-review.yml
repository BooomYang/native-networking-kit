name: Test quality review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  test-quality-review:
    name: test-quality-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require maintainer test quality confirmation
        run: ./scripts/check-test-quality-review.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
