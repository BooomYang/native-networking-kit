name: Review attention router

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  review-attention-router:
    name: review-attention-router
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Route review attention
        run: ./scripts/check-test-quality-review.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_ROUTER_WRITE_OUTPUT: ${{ github.event_name == 'pull_request_target' || github.event_name == 'issue_comment' }}
